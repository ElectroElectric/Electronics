.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card,.product{background:#fff;padding:10px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.product img{width:100%;height:120px;object-fit:contain}
button{padding:8px;margin:5px;border:none;border-radius:5px;background:#28a745;color:#fff}
.old{color:red;text-decoration:line-through;font-size:12px}
.cart{position:fixed;bottom:15px;right:15px;background:#000;color:#fff;padding:12px;border-radius:50%;font-size:18px}
</style>

<input id="state" placeholder="Enter State (Delhi/Other)" style="width:90%;margin:10px;padding:10px">

<div class="cart" onclick="openCheckout()">🛒</div>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

// categories
let catHTML="";
Object.keys(data).forEach(c=>{
 catHTML+=`<div class="card" onclick="openCat('${c}')">${c.toUpperCase()}</div>`;
});
document.getElementById("catList").innerHTML=catHTML;

function openCat(cat){
 document.getElementById("home").style.display="none";
 document.getElementById("products").style.display="block";

 let html="";
 data[cat].forEach(p=>{
  html+=`
  <div class="product">
   <img src="${p.img}">
   <h4>${p.name}</h4>
   ${p.offer ? `<p class="old">₹${p.price}</p><p>₹${p.offer}</p>`:`<p>₹${p.price}</p>`}
   <button onclick="addCart('${p.name}',${p.offer||p.price})">Add</button>
  </div>`;
 });

 document.getElementById("productList").innerHTML=html;
}

function addCart(name,price){
 let item=cart.find(i=>i.name==name);
 if(item){item.qty++}else{cart.push({name,price,qty:1})}
 localStorage.setItem("cart",JSON.stringify(cart));
 alert("Added");
}

function goHome(){
 document.getElementById("products").style.display="none";
 document.getElementById("home").style.display="block";
}

function openCheckout(){
 document.getElementById("products").style.display="none";
 document.getElementById("home").style.display="none";
 document.getElementById("checkout").style.display="block";

 let total=0,html="";
 cart.forEach((c,i)=>{
  let sub=c.price*c.qty;
  total+=sub;

  html+=`
  <p>${c.name} x ${c.qty} = ₹${sub}</p>
  <button onclick="changeQty(${i},1)">+</button>
  <button onclick="changeQty(${i},-1)">-</button>
  <button onclick="removeItem(${i})">Remove</button>
  <hr>`;
 });

 html+=`Total: ₹${total}`;
 document.getElementById("cartItems").innerHTML=html;
}

function changeQty(i,val){
 cart[i].qty+=val;
 if(cart[i].qty<=0) cart.splice(i,1);
 localStorage.setItem("cart",JSON.stringify(cart));
 openCheckout();
}

function removeItem(i){
 cart.splice(i,1);
 localStorage.setItem("cart",JSON.stringify(cart));
 openCheckout();
}

function payNow(){

 let state=document.getElementById("state").value;
 if(!state){alert("Enter state");return;}

 let total=0;
 cart.forEach(c=> total+=c.price*c.qty);

 let delivery=(state.toLowerCase()=="delhi")?100:150;
 let final=total+delivery;

 if(final<500){alert("Minimum ₹500 order");return;}

 if(!confirm(`Total ₹${total}\nDelivery ₹${delivery}\nFinal ₹${final}`)) return;

 window.open(paymentLink,"_blank");

 document.getElementById("checkout").innerHTML=`
 <h2>✅ Order Placed</h2>
 <p>Aapka order aap tak zarur pahuchaya jayega</p>
 <p>Payment screenshot Instagram par bheje</p>
 <a href="${insta}" target="_blank" style="background:#E1306C;color:#fff;padding:10px;border-radius:5px;text-decoration:none;">Open Instagram</a>
 <h3>Thank You ❤️</h3>
 `;

 localStorage.removeItem("cart");
}
