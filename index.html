<!DOCTYPE html>

<title>Electro Electric</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{background:#131921;color:#fff;text-align:center;padding:15px}
header h1{margin:0;font-size:32px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}

.card,.product{
background:#fff;padding:10px;border-radius:10px;text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.product img{
width:100%;height:120px;object-fit:contain;margin-bottom:5px
}

button{
background:#28a745;color:#fff;border:none;padding:8px;border-radius:5px
}

.cart{
position:fixed;bottom:20px;right:20px;
background:#000;color:#fff;padding:12px;border-radius:50%
}

/* 🔥 NEW BACK BUTTON */
.backBtn{
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:16px;
z-index:999;
box-shadow:0 3px 8px rgba(0,0,0,0.3)

</style>

// CATEGORY LOAD
let catHTML="";
Object.keys(data).forEach(c=>{
catHTML+=`<div class="card" onclick="openCat('${c}')"><h3>${c.toUpperCase()}</h3></div>`;
});
document.getElementById("catList").innerHTML=catHTML;

// OPEN CATEGORY
function openCat(cat){
document.getElementById("home").style.display="none";
document.getElementById("products").style.display="block";

let html="";
data[cat].forEach(p=>{
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>

<p>
₹${p.offer || p.price}
${p.offer ? `<span style="text-decoration:line-through;color:red;font-size:12px">₹${p.price}</span>` : ""}
<br><small>${p.unit}</small>
</p>

<button>Add</button>
</div>`;
});

document.getElementById("productList").innerHTML=html;
}

function goHome(){
document.getElementById("products").style.display="none";
document.getElementById("home").style.display="block";
}

</script>
