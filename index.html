<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro Electric</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{background:#131921;color:#fff;text-align:center;padding:10px}
header h1{margin:5px 0;font-size:32px}

.header-img{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}

.card,.product{
background:#fff;padding:10px;border-radius:10px;text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.product img{
width:100%;height:120px;object-fit:contain;margin-bottom:5px
}

button{
background:#28a745;color:#fff;border:none;padding:8px;border-radius:5px
}

.cart{
position:fixed;bottom:20px;right:20px;
background:#000;color:#fff;padding:12px;border-radius:50%
}

/* BACK BUTTON */
.backBtn{
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:#fff;
padding:12px 18px;
border-radius:8px;
font-size:16px;
z-index:999;
box-shadow:0 3px 8px rgba(0,0,0,0.3)
}

</style>
</head>

<body>

<header id="mainHeader">
<h1>Electro Electric</h1>
<p>Welcome to the electronics website</p>

<!-- 🔥 HEADER IMAGE (ONLY HOME) -->
<img class="header-img" 
src="https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/electro%20electric%20head.jpeg">
</header>

<!-- HOME -->
<div id="home">
<div class="grid" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div id="products" style="display:none">
<button class="backBtn" onclick="goHome()">⬅ Back</button>
<div class="grid" id="productList"></div>
</div>

<div class="cart">🛒</div>

<script>

// DATA (same as before)
let data={
diode:[
{name:"5v6 Zener",price:80,offer:70,unit:"50 pcs",img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/zener%205v6.jpeg"},
{name:"FR207",price:150,offer:130,unit:"30 pcs",img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/FR207.jpeg"}
],
transistor:[
{name:"TL431",price:80,offer:70,unit:"50 pcs",img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/tl431.jpeg"}
],
pcb:[
{name:"Induction Board",price:300,offer:280,unit:"1 pcs",img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/induction270.jpeg"}
]
};

// CATEGORY LOAD
let catHTML="";
Object.keys(data).forEach(c=>{
catHTML+=`<div class="card" onclick="openCat('${c}')"><h3>${c.toUpperCase()}</h3></div>`;
});
document.getElementById("catList").innerHTML=catHTML;

// OPEN CATEGORY
function openCat(cat){
document.getElementById("home").style.display="none";
document.getElementById("products").style.display="block";

/* 🔥 HEADER IMAGE HIDE */
document.getElementById("mainHeader").style.display="none";

let html="";
data[cat].forEach(p=>{
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>

<p>
₹${p.offer || p.price}
${p.offer ? `<span style="text-decoration:line-through;color:red;font-size:12px">₹${p.price}</span>` : ""}
<br><small>${p.unit}</small>
</p>

<button>Add</button>
</div>`;
});

document.getElementById("productList").innerHTML=html;
}

// BACK HOME
function goHome(){
document.getElementById("products").style.display="none";
document.getElementById("home").style.display="block";

/* 🔥 HEADER IMAGE SHOW AGAIN */
document.getElementById("mainHeader").style.display="block";
}

</script>

</body>
</html>
