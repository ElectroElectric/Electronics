<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro Electric</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
}
header h1{margin:0;font-size:34px;letter-spacing:1px}
header p{margin:5px 0 0;font-size:14px;color:#ccc}

/* BANNER */
.banner img{
width:100%;
height:150px;
object-fit:cover;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
}
.search input{
width:100%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

/* CARD */
.card,.product{
background:#fff;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}
.card:hover,.product:hover{
transform:scale(1.03);
}

/* PRODUCT */
.product img{
width:100%;
height:120px;
object-fit:contain;
}

/* BUTTON */
button{
padding:8px 12px;
border:none;
border-radius:5px;
background:#28a745;
color:#fff;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#fff;
padding:12px;
border-radius:50%;
font-size:18px;
}
.count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
padding:3px 6px;
border-radius:50%;
font-size:12px;
}

/* CHECKOUT */
.checkout{
padding:10px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0008;
display:none;
justify-content:center;
align-items:center;
}
.popup div{
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
}

/* WARNING */
.warning{
color:red;
font-size:13px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
<h1>Electro Electric</h1>
<p>Welcome to the electronics website</p>
</header>

<!-- BANNER (FIXED LINK) -->
<div class="banner">
<img src="https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/electro%20electric%20head.jpeg">
</div>

<!-- LOGIN -->
<div id="login" style="padding:10px">
<input id="user" placeholder="Enter Mobile or Email">
<button onclick="login()">Continue</button>
</div>

<!-- HOME -->
<div id="home" style="display:none">

<div class="search">
<input id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="grid" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div id="products" style="display:none">
<div class="grid" id="productList"></div>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" style="display:none" class="checkout">

<div id="cartItems"></div>

<textarea id="addr" placeholder="Full Address"></textarea>
<input id="state" placeholder="State (Delhi/Other)">

<p>Total: ₹<b id="total"></b></p>

<p class="warning">
⚠️ Exact amount hi pay kare. Galat payment par order process nahi hoga aur refund nahi milega.
</p>

<button onclick="payNow()">Pay Now</button>
</div>

<!-- CART -->
<div class="cart" onclick="openCheckout()">
🛒 <span class="count" id="count">0</span>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div>
<h3>✅ Order Confirmed</h3>
<p>Screenshot aur invoice Instagram par bheje</p>
<a href="https://www.instagram.com/imran_shaikh99533" target="_blank">
<button>Open Instagram</button>
</a>
<br><br>
<button onclick="downloadPDF()">Download Invoice</button>
</div>
</div>

<script>

let paymentLink="https://razorpay.me/@mohdimran8812";

let data={
"mosfet":[
{name:"19N60 MOSFET",price:40,img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/19N60.jpeg"},
{name:"15N60 MOSFET",price:40,img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/15N60.jpeg"}
],
"transistor":[
{name:"C1815",price:80,img:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/c1815.jpeg"}
]
};

let catImages={
mosfet:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/19N60.jpeg",
transistor:"https://cdn.jsdelivr.net/gh/ElectroElectric/Electronics@main/c1815.jpeg"
};

let cart=[];

/* LOGIN */
function login(){
if(!document.getElementById("user").value){alert("Enter details");return;}
document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";
loadCat();
}

/* CATEGORY */
function loadCat(){
let html="";
Object.keys(data).forEach(c=>{
html+=`
<div class="card" onclick="openCat('${c}')">
<img src="${catImages[c]}" style="height:80px">
<h4>${c.toUpperCase()}</h4>
</div>`;
});
document.getElementById("catList").innerHTML=html;
}

/* PRODUCTS */
function openCat(cat){
document.getElementById("home").style.display="none";
document.getElementById("products").style.display="block";

let html="";
data[cat].forEach(p=>{
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

/* CART */
function addCart(name,price){
let item=cart.find(i=>i.name==name);
if(item){item.qty++}else{cart.push({name,price,qty:1})}
updateCart();
}

function updateCart(){
let c=0;
cart.forEach(i=>c+=i.qty);
document.getElementById("count").innerText=c;
}

/* SEARCH */
function searchProduct(){
let val=document.getElementById("search").value.toLowerCase();
let html="";
Object.values(data).flat().forEach(p=>{
if(p.name.toLowerCase().includes(val)){
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
}
});
document.getElementById("productList").innerHTML=html;
}

/* CHECKOUT */
function openCheckout(){
document.getElementById("products").style.display="none";
document.getElementById("home").style.display="none";
document.getElementById("checkout").style.display="block";

let total=0,html="";
cart.forEach(c=>{
let sub=c.price*c.qty;
total+=sub;
html+=`<p>${c.name} x ${c.qty} = ₹${sub}</p>`;
});

document.getElementById("total").innerText=total;
document.getElementById("cartItems").innerHTML=html;
}

/* PAYMENT */
function payNow(){
window.open(paymentLink,"_blank");
document.getElementById("popup").style.display="flex";
}

/* PDF */
function downloadPDF(){
let text="Electro Electric Invoice\nThank You";
let blob=new Blob([text],{type:"text/plain"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="invoice.txt";
link.click();
}

</script>

</body>
</html>
